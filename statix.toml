# ═══════════════════════════════════════════════════════════════
# 🔎 STATIX - NIX LINTER CONFIGURATION
# ═══════════════════════════════════════════════════════════════

# ──── Ignored Files ─────────────────────────────────────────────
# hardware-configuration.nix is auto-generated by nixos-generate-config
# and must not be manually modified
ignore = ["hardware-configuration.nix"]

# ──── Disabled Lints ────────────────────────────────────────────
# W04 manual_inherit_from: false positive on string literals "true"
#   inside INI-generating attrsets in git.nix — cannot use inherit
#   for plain string values
#
# W20 repeated_keys: intentional — systemd.services.* and
#   systemd.timers.* are split across named section headers
#   (# ═══) in configuration.nix for visual organization
disabled = ["manual_inherit_from", "repeated_keys"]
